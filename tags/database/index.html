/01as9r5n5k.xo.js\"],\"default\",1]\n:HL[\"/_next/static/chunks/0yshvtcd3-qoc.css\",\"style\"]\n7:T1cd8,"])</script><script>self.__next_f.push([1,"\n## 1. 이번주는 무엇을 했는가?\n\n시간이 얼마 안 남았다는 조급함 때문인지, 이번주는 시간이 유독 빠르게 지나간 것 같다. 거의 매일같이 새벽 4시를 넘겨가며 개발을 했음에도 아직 해야할 일이 너무 많게만 느껴진다. 일단, 백엔드 파트는 지난주에 세워놓았던 기능을 모두 구현하였다. 기능을 구현하는 과정에서 TypeORM으로 관계를 설정한 후에 QueryBuilder로 JOIN해야 했는데 이 부분에서 꽤 고생했다. 그것 말고는 큰 이슈를 만나지 못했다. 거의 하루정도를 TypeORM으로 JOIN하는 방법을 알아보고, 이해하는 과정을 통해 현재는 QueryBuilder에 약간은 익숙해진 것 같다.\n\n## 2. N+1\n\nORM에서 가장 흔한 문제 중에 하나는 N+1 문제이다.\n\n\u003e 관계가 설정된 엔티티를 조회할 경우에 조회된 데이터 갯수(n) 만큼 연관 관계의 조회 쿼리가 추가로 발생하여 데이터를 읽어오게 되는데, 이를 N+1 문제라고 한다.\n\nJava Spring에서 JPA hibernate ORM의 경우 OneToMany의 기본 조회 방식은 지연 로딩(Lazy Loading)이고, ManyToOne의 기본 조회 방식은 즉시 로딩이므로 `N+1` 문제를 바로 접할 수 있다고 한다. 반면에, TypeORM은 아래와 같이 어떤 종류의 관계에서도 기본 조회 방식을 적용하지 않는 것을 확인할 수 있다.\n\n```ts\nexport interface RelationOptions {\n  /**...*/\n  lazy?: boolean;\n  /**...*/\n  eager?: boolean;\n}\n```\n\n주특기 주차에서 개인적으로 N+1 문제를 따로 공부한 적이 있다. 이 내용을 토대로 QueryBuilder를 사용하여 즉시 로딩 방식을 적용하려면 `leftJoinAndSelect`를 사용해야 한다는 것까지는 알고 있었다. 그렇다면, `leftJoin` 후에 `addSelect`로 특정 필드의 데이터를 조회하는 경우에도 즉시 로딩 방식에 해당하는지 의문이다. 로그로 남겨진 쿼리문을 보면 쿼리문이 한 번만 실행되므로 즉시 로딩 방식에 맞는 것 같은데, 내가 알고 있던 즉시 로딩 방식과는 차이가 있었기 때문이다. 처음 JOIN을 구현할 때에는 lazy 로딩 방식으로 구현하려고 하였으나, `leftJoin`과 `leftJoinAndSelect`는 무슨 차이가 있는지 알아보다가 한 번 적용해보았는데, 코드 가독성면에서 훨씬 괜찮은 것 같다. 이게 진짜로 괜찮은 방법인지는 증명해보아야 하겠지만, 필요한 데이터만 조회한다는 점에서는 lazy 로딩 방식의 장점이 적용된 eager 로딩인듯한 느낌이다.\n\n\u003e TypeORM의 버전이 계속 업데이트 되고 있는데, 0.2.x 버전과 0.3.x 버전의 차이가 꽤 큰 것 같다. 처음에 Express에서 TypeORM 0.3.x 버전을 사용했을 때에는 DataSource 객체로 TypeORM 설정을 해주어야 했다. NestJS에서 아직 0.3.x 버전을 지원하지 않기 때문에 0.2.x 버전을 사용하고 있다.\n\n## 3. 걱정 아닌 걱정\n\n기본 기능을 구현하면서 생긴 걱정거리들을 글로 정리해보고자 한다. 위에도 언급했지만, 아직까지 기술적으로 크게 부딪혔다라고 할 수 있는 부분을 찾지 못한 것 같다. 누군가에게는 기술적인 문제라고 생각할 수도 있지만, 내 기준에서는 기술적 문제라고 할 만한게 없다.\n\n내 기준에서 기술적 문제는 구글링을 통해 해결할 수 없는 문제인 것 같다. 예를 들어, 라이브러리의 버전이 업데이트되면서 아무도 이슈를 남겨놓지 않았거나, 정말 새로운 기술적인 도전을 해보는 경우가 기술적 문제인 것 같다.\n\n\u003e 물론, 내가 아직 경험이 부족한 탓에 이와 같은 교만한 생각이 든 것일 수 있다. 경험이 더 쌓이면 의미가 바뀔 수 있지 않을까?\n\n이건 기술 멘토링 때에도 질문을 할 수 없는 이유이기도 한데, 직장생활하면서 `충분히 검색해보고 정말 모르겠는 내용`을 질문하려는 태도가 아직도 몸에 많이 베어있는 것 같다. 다만, 코드를 왜 그렇게 작성했는지, 구조를 왜 그렇게 잡았는지 등에 대해서는 할 말이 많을 것 같다. 이것도 기술적 문제라고 하면 기술적 문제일 수 있겠으나, 이 주제로 발표하라고 한다면, 글쎄... 잘 모르겠다.\n\n\u003e 내가 구조를 주제로 발표하기에는 아는 것과 경험한 것이 적은 탓에 누군가 이 발표 주제를 감명깊게 들었다면 그 청자는 잘못된 정보를 얻게된 것일 수 있기 때문이다.\n\n또 다른 걱정은, 지금 프론트엔드의 진도가 매우 늦다는 것이다. 예정대로라면, 오늘 기본 기능이 전부 구현되고, 서버랑 통신까지 마친 상태여야 했다. 이를 사람의 신체로 나타내면 현재 무릎 위치 정도까지 개발이 완료된 상태이다. 프론트랑 서버가 연결되고, 서로 통신하는 과정에서 추가적인 기능, 예상치 못한 오류를 발견하고, 이를 해결해나갈 계획이었는데 이 계획이 매우 불분명해진 것 같다. 더군다나 엊그제 프론트엔드에서 리팩토링을 진행하길래 동의 하에 코드 수정을 도와줬는데, `죽이 되든 밥이 되든 프론트는 저희가 알아서 할게요`라는 말을 들은 이후로는 무엇을 우선적으로 처리해야할 지 감이 잘 잡히지 않는다.\n\n## 4. 디자이너의 관점과 개발자의 관점\n\n이번에 들어오신 디자이너분들 모두 훌륭하신 것 같다는 생각을 줄곧 해왔다. 적극적이시고, 참신한 아이디어도 제안해주시고, 책임감을 갖고 끝까지 하려는 모습에서 큰 힘을 얻었던 것 같다. 그런데, 우리(개발자)가 디자이너분들의 좋은 아이디어를 실현시킬 시간이 부족하다는 사실에 항상 죄송스러운 마음이 들곤 했다. 새벽 1시부터 아침 8시까지 디자이너분과 대화한 끝에 서로의 입장을 이해하고, 오해를 풀게 되었다.\n\n\u003e 오후 11시, 팀원들을 퇴근시킨 후에도 나는 계속 디스코드에 접속해서 코딩을 하고 있었는데, 새벽 1시에 디자이너분께서 대화를 요청하셨다. 마이크로 대화만 하는 것이기 때문에 그 시간동안 손으로는 코드를 작성하고, 입으로는 말을 하였다.\n\n디자이너분들 입장에서는 본인들의 UI/UX가 실제 서비스에 적용되는 것과 더불어 개발한 서비스가 얼마나 훌륭한가를 중점으로 보고 있는 듯 하였다. 그러나, 개발자의 입장에서는 어떠한 문제가 발생하였고, 어떻게 해결하였는지에 큰 비중을 두고 있다는 것을 공유하면서 평화로운 대화가 오갔다. 결론적으로는, 서로의 입장을 이해하며 프로젝트를 진행하되, 시간이 허락하는 선에서 디자이너분들께서 해주신 디자인을 최대한 반영하기로 하였다.\n\n## 5. 다음 주 계획\n\n내일부터는 NestJS 단위 테스트, 통합 테스트 코드를 작성하고, 소켓 통신 쪽을 구현할 것 같다. 소켓 통신을 테스트하기 위해서는 프론트엔드와 연결해보아야 하는데, 이건 직접 React로 코드를 작성해서 테스트를 해 볼 예정이다. 시간이 얼마 안 남았지만, 그래도 끝까지 최선을 다해보려고 한다.\n"])</script><script>self.__next_f.push([1,"8:T3ed6,"])</script><script>self.__next_f.push([1,"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAS0AAACiCAYAAAAUcptXAAAAAXNSR0IArs4c6QAAAFBlWElmTU0AKgAAAAgAAgESAAMAAAABAAEAAIdpAAQAAAABAAAAJgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAABLaADAAQAAAABAAAAogAAAACIkbrsAAABWWlUWHRYTUw6Y29tLmFkb2JlLnhtcAAAAAAAPHg6eG1wbWV0YSB4bWxuczp4PSJhZG9iZTpuczptZXRhLyIgeDp4bXB0az0iWE1QIENvcmUgNi4wLjAiPgogICA8cmRmOlJERiB4bWxuc  다양한 사람들과 식사를 하면서 편안하게 고민을 상담하거나, 지식을 얻을 수 있도록 도와주는 서비스`이다. 이 주제를 선정한 기준으로는 크게 기획, 기술로 구분된다. 먼저, 아이디어 자체는 굉장히 마음에 들었다. 그 이유는 직장생활을 하면서 처음 프로그래밍을 접하게 되었을 때, 이러한 서비스가 있었으면 좋겠다고 생각한 적이 있기 때문이다. 이어서, 기술면적으로 보자면 또 다시 두 가지로 나눌 수 있을 것 같다. 첫 번째로는 스파르타 코딩클럽 측에서 설명한 기술적 챌린지 기준이다.\n\n- socket.io를 사용한 실시간 채팅 기능 구현 : 80%\n- 실제로 사용할만한 서비스 : 60%\n- 참신한 주제 : 80%\n- 호기심 유발 가능성 : 50%\n\n다음은 안정적인 프로덕트 관점에서 바라본 기술적 챌린지 기준이다.\n\n- 서버 안정성 : 80%\n- 비교적 복잡한 DB 테이블 관계 형성 : 80%\n- 쿼리 성능 보장 : 70%\n- AWS 아키텍처 구조 : 100%\n- 코드 리팩토링 : 100%\n\n즉, 나는 이 프로젝트의 백엔드 개발자로서 서버 안정성, DB 테이블 관계 형성, 쿼리문 튜닝, AWS 아키텍처 구조, 코드 리팩토링 등 여러 구성요소를 기술적 챌린지로 활용할 수 있을 것으로 생각하였다. 뿐만 아니라, 협업이라는 요소 또한 챌린지 대사으로 추가해도 된다고 생각한다. 이 주제로 프로젝트를 진행한다면 내가 실제로 사용해본 경험이 없는 기술을 사용할 수 있을 것으로 보였고, 추가적으로 캐싱 등의 또 다른 기술까지 접목시킬 수 있다고 생각하였다.\n\n## 2. 주요 기능 선정\n\n### 2.1. 매칭\n\n이 프로젝트의 주된 기능은 바로 매칭이다. 매칭의 방식으로는 크게 자의적, 타의적으로 구분할 수 있다. 즉, 참여자가 직접 해당 그룹에 참여하거나, 랜덤으로 그룹이 형성되어 매칭되는 방식을 말한다. 이 중에서 우리는 자의적 매칭 방식을 적용하기로 하였다. 그 이유는 해당 서비스에 참여하는 참여자의 현재 위치에 따라 실제 만남이 성사되어야 의미가 있기 때문인데, 랜덤 방식으로 진행하게 된다면 실제 만남이 성사되기 매우 어려울 수 있기 때문이다. 물론, 현재 접속자의 위치에 따라 인접한 사람들을 랜덤으로 매칭시켜줘도 되나, `음식 메뉴`라는 또 다른 변수가 있기 때문에 이마저도 어려울 것으로 보였다. 조금 더 자세히 말하자면, 특정 음식 메뉴에 알러지 반응이 있는 사람들인 경우 실제로 어떠한 그룹에 참여했을 때 음식을 먹지 못하는 상황이 발생할 수도 있다. 뿐만 아니라, 랜덤으로 매칭하게 된다면 서비스 자체 본질이 흐려질 수 있다고 생각하였다. 즉, 랜덤으로 아무나 매칭시켜주고, 현재 그룹원의 정보를 공개하는 순간 불순한 이유로 인해 해당 그룹이 폭파될 수 있기 때문이다. 따라서, 자신이 직접 만나서 조언을 듣거나, 고민 상담이 필요한 분야의 사람을 직접 찾아 나서거나, 해당 사람들이 생성한 그룹에 직접 참여함으로써 참여자 스스로의 선택에 대한 책임감을 갖고 모임에 참여하도록 하였다.\n\n### 2.2. 실시간 채팅\n\n해당 그룹에 참여한 이후에는 그룹 채팅방을 통해 간단한 인사와 서로의 연락처를 주고 받는 공간을 마련하고자 한다. 실시간 채팅 기능을 구현하는 것은 크게 어렵지 않다. 다만, 실시간 채팅 기능을 구현하면 `과연 사람들이 많이 이용할 것인가?`, `해당 기능이 우리 서비스에 반드시 필요한 기능인가?`에 대해서는 다시 한 번 검토해 볼 필요가 있다고 생각한다. 뒤에서 언급하겠지만, 우리 프로젝트의 주된 서비스는 주로 Kakao API에 의존하고 있다. 그렇다면 실시간 채팅을 구현하면서 또 다른 EC2 인스턴스와 자원을 낭비하는 것보다는 카카오톡 알림 기능 API를 사용하는 편이 더 낫지 않을까?라는 생각이 들곤 한다. 물론, 직접 구현한 이후에 사용자들이 실시간 채팅을 많이 이용해주면 서버의 부하를 늘릴 수 있다는 장점이자 단점이 있다. 나는 서버 개발자로써 서버의 부하가 증가하면 포트폴리오에 기록할 내용이 많아져서 장점이 될 수 있으나, 만약 구현해 놓았는데도 불구하고 이용자가 많지 않다면 결국 인력과 시간만 낭비하는 셈이 된다(만약 내가 서비스 이용자라면, 그룹원들의 연락처를 얻기 위해 1~2마디 정도 대화한 후 다른 매체를 통해 소통할 것 같다). 따라서, 실시간 채팅 기능을 사용하도록 유도하는 별도의 시스템(장치 또는 체제)을 마련하거나, 카카오톡 알림 API를 사용하여 시간 낭비를 절약하는 것이 최선이라고 생각된다.\n\n## 2.3. Kakao API\n\n### 2.3.1. Kakao Login API\n\n처음 설계할 당시에만 하더라도 서비스 자체 회원가입/로그인 방식을 구현하기로 결정하였다. 그러나, 프로젝트의 MVP가 `실제 모임`이기 때문에 적어도 사용자들의 신원 정보가 확인되어야 한다고 생각하였다. 이를 위해 국내에서 가장 많이 사용하는 메신저 애플리케이션인 카카오톡을 기반으로 기본적인 신원인증을 구현하는 것이 적합하다고 생각하였다. 물론, 문자메시지, 이메일, 신분증 OCR을 통한 인증 또한 가능하겠지만 이를 사용하면 추가적인 비용 발생, OCR 사용 시 서비스의 주된 기능 개발 시간 감소 등의 문제점이 있다고 생각하여 카카오 API에 의존하는 편이 더 낫다고 판단하였다.\n\n### 2.3.2. Kakao Map API\n\n모임의 장소를 나타내는 데에 가장 직관적인 수단을 뽑자면, 그것은 단연코 `지도`일 것이다. 따라서, 프로젝트에서도 사용자로 하여금 지도를 통해 직관적으로 해당 장소를 파악할 수 있도록 하였다. 이때, 지도는 카카오 Map API를 사용하여 구현하기로 하였는데, 그 이유 중 하나는 외부 API 플랫폼 응집도를 높이기 위해서이다. Kakao Map API나 Naver Map API를 사용하기 위해서는 해당 API를 사용하기 위한 Secret Key를 별도로 보관하여야 한다. 그런데, 로그인은 Kakao API를 사용하고, Map만 Naver API로 사용한다면 관리해야 하는 플랫폼이 늘어나게 된다. 따라서, 초기에는 Kakao API만을 사용하여 Secret Key의 통일성을 확보하고자 하였다. 이러한 기술적 논의 과정에서 문득 배달의 민족 CEO 김범준 대표가 한 말이 떠올랐다.\n\n\u003e 프로그래머가 1만줄의 코드를 작성했다고 해서 반드시 좋은 프로그래머라고는 할 수 없다.\n\u003e 당신의 코드로 만들어진 비즈니스 가치가 중요한 것이지, 코딩 자체로 인정받는 것은 아니다.\n\u003e 때로는 어떠한 문제를 해결하는 가장 좋은 방법이 정책을 바꾸고 프로그래밍을 하지 않는 것일 수도 있다.\n\n즉, 이 프로젝트를 통해 제공하고자 하는 주된 서비스는 신원 인증이나 지도를 보여주는 것이 아니며, 프로젝트 기간이 약 2주 정도로 짧기 때문에 핵심 기능을 구현하는데 더욱 집중하는 편이 낫다고 생각하였다.\n\n## 3. 예상되는 문제\n\n이 서비스를 개발하는 과정 또는 실제로 시범 운영하면서 예상되는 문제점에 대해서 기획 관점으로 기록해보았다.\n\n### 3.1. 신고 \u0026 블랙리스트 vs 모임 인증 \u0026 리뷰\n\n이와 같은 플랫폼 서비스를 이용하다보면 누구나 한 번쯤은 신고 게시판을 보았을 것이다. 이는 사람의 문제를 기계가 해결할 수 없기 때문에 별도로 관리자를 두어 해당 계정을 블랙리스트에 추가하는 등의 조치가 필요하기 때문이다. 이 프로젝트를 개발한 후, 실제 상용 단계에 이르렀을 때에는 이를 관리하기 위한 별도의 신고, 블랙리스트 관리 시스템이 도입되어야 할 것으로 예상된다. 그러나, 이 서비스를 실제 상용 단계까지 발전시킬 것인지와 서비스를 장기간 운영할 것인지는 아직 미지수이므로 해당 기능의 기획은 뒤로 미루기로 하였다.\n\n예를 들어, 해당 기능을 구현하기 위한 별도의 테이블을 구성하기 위해 테이블 간 관계를 맺어주는 과정에서의 설계 논의, 잘못된 신고로 인한 유저의 블랙리스트 해제 등 다양한 인적 예외 처리 사항에 대한 팀 내부적인 논의가 필요하다. 따라서, 이 문제를 고민하기보다는 차라리 모임 인증, 리뷰 게시판을 구현하여, 건전한 모임을 형성하는데 도모하고 해당 기능을 통해 작은 이벤트를 운영하여 트래픽을 유도하는 방향이 더욱 바람직하다는 생각이 들었다.\n\n### 3.2. 테스트 및 서버 안정성 확보\n\n갑작스럽게 트래픽이 증가한다면 서버의 안정성은 어떻게 확보할 것인가? 내가 아는 선에서 이론적으로는 설명할 수 있으나, 이와 관련된 문제를 실제로는 접해본 경험이 없기 때문에 명확한 해결 방법이 떠오르지 않는다. 따라서, 실제 서비스를 배포하기 전에 테스트를 진행하고자 한다. 테스트 방법에는 크게 단위 테스트, 통합 테스트, 성능 테스트로 구분되는데, 트래픽에 관련해서는 성능 테스트가 적합하다. 또한, 핵심 비즈니스 로직, 연산 처리까지 테스트하여 내가 작성한 코드에 대한 신뢰성을 확보하는 것을 목표로 하였다. 아직까지는 제대로 된 테스트 코드를 작성해본 경험이 없기 때문에, 이 과정 자체가 내게는 기술적 도전이 아닐까라는 생각이 든다. 또한, 실제로 서비스를 운영하고, 마케팅이나 이벤트와 같은 요소로 가급적 많은 사용자들이 참여할 수 있도록 트래픽을 증가시키고 그로인해 발생되는 서버 이슈에 관해서 직접 해결하고, 이를 기록으로 남겨놓고자 한다.\n\n### 3.3. 그 밖의 사항들에 대하여\n\n위에서 언급한 내용 이외에도 여러 문제와 마주칠 것이라고 예상하고 있다. 가령, 현재 접속자 위치에 따른 그룹 목록 조회 API, 무한 스크롤을 구현할 때 현재 접속자 위치에 따른 제한된 수량의 데이터를 조회하는 API 등을 구현할 때 해당 문제를 어떻게 해결할 것인지 고민해보아야 할 것으로 보인다. 뿐만 아니라, 해당 문제들을 해결한 이후에는 어떻게 더 효율적으로 동작시킬 수 있는지에 대해 많은 고민이 필요할 것으로 예상된다.\n\n## 4. 마치며\n\n기록하고 싶은 내용이 차고 넘치지만, 9시에 회의가 있기 때문에 일단은 여기서 마치겠다. 마지막으로 다음 글을 나의 중심으로 삼고 프로젝트를 진행하려고 한다.\n\n\u003e \"우리가 지금 겪고 있는 모든 현상들은, 되돌아보면 부족하게 느낄지는 몰라도 그게 어제의 최선이었다.\"\n\n즉, `나는 이것밖에 안 돼`라는 마음가짐보다는 어제보다 더 나은 최선의 상황을 만들기 위해 끊임없이 공부하고 도전해보는 자세로 프로젝트에 임하려고 한다.\n"])</script><script>self.__next_f.push([1,"a:T3ed6,"])</script><script>self.__next_f.push([1,"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAS0AAACiCAYAAAAUcptXAAAAAXNSR0IArs4c6QAAAFBlWElmTU0AKgAAAAgAAgESAAMAAAABAAEAAIdpAAQAAAABAAAAJgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAABLaADAAQAAAABAAAAogAAAACIkbrsAAABWWlUWHRYTUw6Y29tLmFkb2JlLnhtcAAAAAAAPHg6eG1wbWV0YSB4bWxuczp4PSJhZG9iZTpuczptZXRhLyIgeDp4bXB0az0iWE1QIENvcmUgNi4wLjAiPgogICA8cmRmOlJERiB4bWxuczpyZGY9Imh0dHA6Ly93d3cudzMub3JnLzE5OTkvMDIvMjItcmRmLXN5bnRheC1ucyMiPgogICAgICA8cmRmOkRlc2NyaXB0aW9uIHJkZjphYm91dD0iIgogICAgICAgICAgICB4bWxuczp0aWZmPSJodHRwOi8vbnMuYWRvYmUuY29tL3RpZmYvMS4wLyI+CiAgICAgICAgIDx0aWZmOk9yaWVudGF0aW9uPjE8L3RpZmY6T3JpZW50YXRpb24+CiAgICAgIDwvcmRmOkRlc2NyaXB0aW9uPgogICA8L3JkZjpSREY+CjwveDp4bXBtZXRhPgoZXuEHAAAtB0lEQVR4Ae2dCZgV1ZXHbzcNTXezgywBFAiLgUD00xijgjoaJ5LFEc0AapbRcdRBk4yajBNNJkFNoiEzWVyjMYlbZFyIE0WZmOAS14AoyBYw7IrsS9M0S9NzftV9m3rVt96r9169 적극적이시고, 신선한 아이디어를 많이 제공해주셨던 것 같다. 여러 우여곡절 끝에 기획 초안과 와이어프레임이 구성되었고, ERD 설계와 API 설계를 진행하였다. 그런데, 이 과정에서 다음과 같은 어려움이 있었다.\n\n### 2.1. 리더 \u0026 부리더 세션\n\n실전 프로젝트 전날에 리더 \u0026 부리더 세션을 진행하였다. 이 세션에서는 스파르타측 매니저님이 리더와 부리더의 역할과 책임, 프로젝트 주제 선정 시 유의해야할 점 등에 대해서 말해주었다. 이 내용을 간략하게 요약하면 다음과 같다.\n\n- CRUD를 구현하는 형태의 서비스는 가급적이면 제외시키자.\n  - 예를 들어, 맛집 공유, 협업 툴 등의 주제는 너무 흔하다.\n  - 채용자로 하여금 관심을 이끌어낼 수 있는 주제로 선정하는 것이 좋다.\n  - 즉, 참신함이 필요하다.\n- 기술적 챌린지를 반드시 선정하자.\n  - 앞서 언급하였듯이 CURD만으로 구성된 서비스는 너무 뻔하다.\n  - Socket.io, three.js, WebRTC 등을 활용하면 고수준의 기술력을 어필할 수 있다.\n\n즉, 채용 담당자가 보기에 호기심을 가질만한 주제를 정하거나, 기술력을 높이면 될 것이라고 생각하였다. 이를 토대로 팀원들과 상의하여 추려본 주제는 다음과 같다.\n\n- 부트캠프 및 개발자 양성 교육기관 비교 \u0026 리뷰 플랫폼\n- 맛집 공유 서비스\n- 팸투어 모집 광고 플랫폼 서비스\n- 크라우드 펀딩 사이트\n- 실시간 코드 에디터\n\n이 말을 듣고 머릿속은 온통 의문으로만 가득차게 되었다. 내가 자주 즐겨보던 유튜브 채널 개발바닥에서의 내용과는 상반된 내용이었을 뿐더러, 내가 생각했던 프로젝트의 진행 방향과는 다소 차이가 있었기 때문이다. 나는 개인적으로 `프로젝트에 사용된 다양한 기술`보다는 `안정적으로 서비스되는 프로젝트의 아키텍처와 코드`를 더 중시하는 방향이었다. 그런데, 위와 같은 제한사항은 마치 `이 프로젝트를 취업을 위한 포트폴리오로 사용할 것이다`라는 것보다는 `실제로 서비스를 할 만한 독창적인 것을 만들어야만 해`라는 뉘앙스가 더 강렬했기에 시작하기도 전에 부담감에 압도당하는 느낌이었다. 다행히도 유능하신 디자이너님들 덕에 한 가지 괜찮은 주제를 선정하였고, 이를 토대로 팀원들의 동의를 얻어 팀 프로젝트를 진행하기로 하였다.\n\n\u003e 낯선 사람들과 식사를 하는 자리를 마련하되, 단지 식사에서만 끝나는 게 아니라 자연스럽게 전문적인 지식 또는 고민 상담까지 할 수 있도록 도와주는 커뮤니티 서비스\n\n### 2.2. 기획 멘토링과 기술 멘토링\n\n기획 멘토링에서는 우리가 기획한 내용에 대해 어떠한 기능을 더 추가하면 좋을 것인지 등의 세부적인 피드백을 기대했었다. 그러나, 나와 우리팀이 `기획`을 정말 `기획` 그 자체로만 생각해서 그런지 기획에 대한 내용보다는 `기술적 챌린지`에 관한 내용을 더 많이 들었던 것 같다. 기획 멘토링 시간이 끝나고 팀원 모두의 의견이 달라서 다소 혼란스러운 상황이 연출되었는데, 그 이유는 아마도 저마다 생각하고 있는 `기술적 챌린지`에 대한 정의에 차이가 있기 때문이라고 생각한다.\n\n## 3. 기술적 챌린지의 기준\n\n내 기준에서의 기술적 챌린지는 다음과 같았다.\n\n### 3.1. 서비스 안정성과 서버 성능 향상\n\n최신 기능, 화려한 기능을 구현하는 것은 흥미롭다. 그러나, 새로운 것을 사용하고자 할 때에는 명확한 이유가 있어야 한다고 생각한다. 단지 `새롭기 때문에`, `남들이 다 하기 때문에`라는 이유로 [당위성, 목적 적합성에 맞지도 않는 것들을 도입하려는 자세](https://lazygyu.net/blog/hype_driven_development)가 팀 전체를 위험에 빠뜨릴 수 있다는 생각이 들었기 때문이다. 이는 꼭 개발자가 아니더라도 직장 생활을 해보았다면 알 수 있는 내용이라고 생각한다. 최신 기술을 배우고, 적용시키는 것은 언제나 설렘을 가져다주지만, 단지 `최신 기술들을 사용해보았다`는 것보다는 그것을 왜 도입하게 되었는지, 어느정도로 잘 알고 사용하는지, 이를 통해 어떻게 서비스를 운영해 나갔는지 등이 더 유의미하다고 생각했기 때문이다.\n\n### 3.2. 코드의 확장성, 재사용성, 유지보수성 확보\n\n같은 코드를 작성하더라도 OOP로 작성할 수도 있고, FP 방식으로 작성할 수도 있다. 중요한 것은 그렇게 작성한 자신만의 기준, 더 나아가서는 팀의 기준이 있어야 된다는 것이다. 실제로, 프로젝트의 서버 측 프로토타입 코드를 작성할 때 NestJS를 사용하였다. 그런데, DI, IoC 등의 개념을 알아야만 NestJS를 제대로 사용할 수 있을 것 같은 느낌이 들었다. 즉, 이러한 개념을 알지 못한다면, 단지 NestJS의 사용법을 아는 것이지, NestJS를 제대로 이해한 상태로 이용하는 것은 아니라는 생각이 들었다. NestJS의 동작 방식을 이해하기 위해 Express에서 NestJS의 동작 방식을 구현해보며 NestJS의 기술적 의미에 대해서 이해하는 시간을 가졌다.\n\nDecorator(`@Controller`, `@Get`, `@Post` 등)로 class의 metadata를 변경하는 기능을 직접 구현하면서 AOP의 개념에 대한 약간의 의해와 더불어 의존성 주입이 왜 필요한지, IoC 컨테이너가 왜 필요한지, NestJS가 왜 편리한 프레임워크인지에 대한 이해를 쌓은 후 다시 NestJS로 프레임워크를 변경하였다. 이틀 정도는 날려먹은 것 같지만, 스스로는 굉장히 유의미한 시간이었다고 생각한다.\n\n### 3.3. 팀원 간 큰 마찰 없이 무사히 프로젝트를 수행할 수 있는 협업 능력\n\n혼자 사이트 프로젝트를 하면 큰 장벽이 없다. 그 이유는 혼자서 자유자재로 기획, 설계, 구현까지 할 수 있기 때문이다. 그러나, 팀 단위로 프로젝트를 진행할 때에는 변경된 부분에 대해서 모든 팀원과 공유를 해야만 한나. 이 과정에서 의견 충돌이 발생할 수 있고, 심한 경우 감정 싸움까지 번질 수 있기에 조심스러울 수 밖에 없다. 따라서, 팀장이자 팀원으로서 팀원들 간의 의견을 조율하고, 협업할 수 있는 분위기를 조성하고, 소통을 원활히 진행시키는 것 또한 하나의 기술력이라고 생각하였다.\n\n약 3시간 동안 고민하고, 기획을 변경하려다가 먼저 담당 매니저님께 찾아가서 `스파르타 측에서 생각하는 기술적 챌린지의 정의`에 대해 여쭤보기로 하였다. 다행인건지는 모르겠으나, 담당 매니저님께서도 `해당 기술을 왜 사용하는지`, `어떻게 해결하였고`, `왜 그렇게 해결하였는지` 등에 초점을 맞춰 말씀해주셨다. 이후, 팀원들과 소통하며 각자 글로 작성한 후 공유하는 시간을 가짐으로써 프로젝트의 방향성을 하나로 일치시킬 수 있었다.\n\n## 4. 트러블 슈팅\n\n실전 프로젝트가 시작된 이후로 밤을 지새우는 일수가 급격히 증가하고는 있으나, 아직까지는 기술적으로 크게 부딪히지는 못한 것 같다.\n\n\u003e 금요일, 토요일은 새벽 4~5시에 잠이 들었고, 일요일은 오전 6시에 일어나서 현재(월요일 오후 18시)까지 한 숨도 못자고 있다.\n\nAWS elasticbeanstalk를 처음 접해보며, NestJS 애플리케이션의 CI/CD를 구축하는 과정에서 꼬박 하루라는 시간을 쏟거나, Kakao Login API, TypeORM 관계 설정 및 QueryBuilder를 사용할 때 트러블이 계속해서 발생했다. 이는 사용 방법을 명확하게 알지 못해서 발생하는 문제라고 생각이 들었기 때문에 기술적인 난관이라고는 할 수 없을 것 같다. 일단, 이번주는 기본 기능을 전부 구현해놓기로 하였고, 심화 기능(현재 위치 기반 데이터 조회, 정렬, 필터 등)은 다음주부터 구현할 예정이므로 그 때부터 더 큰 기술적 난관에 부딪힐 것 같다. 이전 회사에서의 경험 탓일까, 문제와 맞딱드렸을 때 겁이 나거나 불안하지는 않는 것 같다. 다만, 현재로써는 짧은 프로젝트 기간에 그 문제를 해결하는 동안, 시간이 매우 빠르게 지나가 버린다는 사실이 불안하게 느껴진다.\n\n## 5. 마치며\n\n여기까지 1주차 회고록을 마치겠다. 실전 프로젝트를 시작한 지 약 9일정도 되었다. 아직까지는 기술적으로 크게 얻은 것이 없는 느낌이다. 개발에 조금 더 집중하고 싶은데, 문서 작성, 회의, 설명 등으로 인해 개발에 집중할 수 없는 상황이 약간의 답답함으로 느껴지는 것 같다. 앞으로 약 2주 정도 남았다. 팀원들에게도 자주 하는 말인데, 향후 5년 후에 오늘을 되돌아보았을 때 후회가 더 크지 않도록 활활 불태워보려고 한다.\n"])</script><script>self.__next_f.push([1,"c:T3ed6,"])</script><script>self.__next_f.push([1,"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAS0AAACiCAYAAAAUcptXAAAAAXNSR0IArs4c6QAAAFBlWElmTU0AKgAAAAgAAgESAAMAAAABAAEAAIdpAAQAAAABAAAAJgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAABLaADAAQAAAABAAAAogAAAACIkbrsAAABWWlUWHRYTUw6Y29tLmFkb2JlLnhtcAAAAAAAPHg6eG1wbWV0YSB4bWxuczp4PSJhZG9iZTpuczptZXRhLyIgeDp4bXB0az0iWE1QIENvcmUgNi4wLjAiPgogICA8cmRmOlJERiB4bWxuczpyZGY9Imh0dHA6Ly93d3cudzMub3JnLzE5OTkvMDIvMjItcmRmLXN5bnRheC1ucyMiPgogICAgICA8cmRmOkRlc2NyaXB0aW9uIHJkZjphYm91dD0iIgogICAgICAgICAgICB4bWxuczp0aWZmPSJodHRwOi8vbnMuYWRvYmUuY29tL3RpZmYvMS4wLyI+CiAgICAgICAgIDx0aWZmOk9yaWVudGF0aW9uPjE8L3RpZmY6T3JpZW50YXRpb24+CiAgICAgIDwvcmRmOkRlc2NyaXB0aW9uPgogICA8L3JkZjpSREY+CjwveDp4bXBtZXRhPgoZXuEHAAAtB0lEQVR4Ae2dCZgV1ZXHbzcNTXezgywBFAiLgUD00xijgjoaJ5LFEc0AapbRcdRBk4yajBNNJkFNoiEzWVyjMYlbZFyIE0WZmOAS14AoyBYw7IrsS9M0S9NzftV9m3rVt96r91697n7V53zfe/Ve1V3Prfuvc84991RJ3759642SckA5oBwoEg6UFkk7tZnKAeWAcsDjgIKW3gjKAeVAUXFAQauohksbqxxQDiho6T2gHFAOFBUHFLSKari0scoB5YCClt4DygHlQFFxQEGrqIZLG6scUA4oaOk9oBxQDhQVBxS0imq4tLHKAeWAgpbeA8oB5UBRcUBBq6iGSxurHFAOKGjpPaAcUA4UFQcUtIpquLSxygHlgIKW3gPKAeVAUXFAQauohksbqxxQDiho6T2gHFAOFBUHFLSKari0scoB5YCClt4DygHlQFFxQEGrqIarMI2tq6szfJSUA8XAgbJiaKS2sXAcAKz69+9vOnbsZDZv3mR27NjuVda5c4Xp0KFD4SrWkpUDOXJAQStHxiUlG6AlLzcxp51+pqmp2WOqq6vNhg3rzYq/LjcbN240tbV7PUDr1KlTUrqs/ShyDpTo23iKfARjaP6ePdXmU2d92pxyyoSU0vbs2WPWrFltli1dbF555RVTVVVpVAJLYZH+aQUOKGi1AtPbYpX79+83F170JTN06LAU+5ZVEQGwlSuWmTfffNOsXr1Kpa+2OIjtpE0KWu1koDN1EzWxc+fO5qtfuzo0KQBGurVr15gFb84zS5Ys8exeFthCM+oF5UCMHOhQVVX13RjL06KKlAOlpaVm9+5dpr7+kPnw8BFybP4OX3uuV6/eZuSoo81RRw0xK1euELtXrRrti3Tci7HZClrFOGoFajPG9rffftuMGDnSAEwWpILV2fOkOeGEE01ZWZlZtmyJl0ylriC39H/cHFDQipujRV4eKuKWLZvNyJFHe2CUrjsWvIYMGWo++tGxZuuWLbLi+L7RlcZ0XNNr+XJAQStfDrZi/k2bNhkM5MbUe+oZKl6+R 9+Vo400KZHNUI/4RA6rdko5kFwOKGgld2y1Z8qBRHJAQSuRw6qdUg4klwMKWskdW+2ZciCRHFDQSuSwaqeUA8nlgIJWcsdWe6YcSCQHFLQSOazaKeVAcjmgoJXcsdWeKQcSyQEFrUQOq3ZKOZBcDihoJXdstWfKgURyQEErkcOqnVIOJJcDClrJHVvtmXIgkRxQ0ErksGqnlAPJ5YCCVnLHVnumHEgkBxS0Ejms2inlQHI5oKCV3LHVnikHEskBBa1EDqt2SjmQXA4oaCV3bLVnyoFEckBBK5HDqp1SDiSXAwpayR1b7ZlyIJEcUNBK5LBqp5QDyeXA/wPLfGGWTeUHUQAAAABJRU5ErkJggg=="])</script><script>self.__next_f.push([1,"d:T210f,"])</script><script>self.__next_f.push([1,"\n## 1. 주제\n\nNode.js로 개발할 때 가장 쉽게 접근할 수 있는 데이터베이스로는 MongoDB가 있다. MongoDB는 No-SQL 데이터베이스로 그 형식은 JSON과 매우 유사하다. 이번 일지에서는 사용자 인증 처리 로직이 있는 게시판을 구현하는 경우의 Mongoose 모델 설계 관점에 대해서 다뤄보려고 한다.\n\n## 2. MongoDB의 핵심 기능\n\n앞에서 언급한 주제의 내용을 다루기 전에 간단하게 MongoDB의 핵심 기능에 대해서 다루고 넘어가겠다. MongoDB는 No-SQL 데이터베이스에 속하며, Excel 파일의 테이블 형식이 아닌 JSON 파일과 유사한 document가 collection으로 그룹화되어 있는 구조이다.\n\nMySQL과 같은 관계형 데이터베이스의 경우 하나의 파일에 구조화된 데이터가 저장되는 방식이나, MongoDB는 비교적 형태가 자유롭다. 예를 들어, MySQL의 경우 특정 테이블의 존재하지 않는 field에 데이터를 입력하는 경우 오류가 발생하나, MongoDB는 해당 데이터를 문서에 추가하여 유연하게 동작한다.\n\n이를 다른 말로 나타내면 스키마가 없는 상태(schema-less) 라고 한다. 스키마가 존재하는 MySQL의 경우, 소프트웨어를 설계할 때에는 데이터의 구조에 따라 데이터베이스 구조를 설계하는 방식이라면, MongoDB의 경우에는 스키마가 존재하지 않기 때문에 애플리케이션이 데이터의 구조를 정하는 방식이다.\n\n따라서, 데이터 구조의 변경이 빈번하게 발생하는 개발 초기 단계에서는 스키마를 재설계할 필요가 없으므로 개발 시간을 단축시킬 수 있다. 또한, MySQL의 경우 특정 field에 명시한 데이터 타입을 변경하는 경우 그 과정이 비교적 복잡한 반면에, MongoDB는 스키마가 없는 데이터 모델을 통해 가변적인 속성을 갖는 데이터를 표현할 수 있다는 특징이 있다.\n\n## 3. Linked Document\n\n스키마를 설계할 때에는 데이터 간의 관계를 먼저 따져야 한다. 예를 들어, 게시글과 댓글의 관계를 생각해보자. 하나의 고유한 게시글에는 여러 개의 댓글이 존재할 수 있는 반면, 하나의 고유한 댓글은 여러 개의 게시글에 포함될 수 없으며, 이와 같은 패턴을 `1:N`이라고 하다. MySQL을 사용하면 이와 같은 패턴을 다음과 같은 형태로 나타낼 수 있다.\n\n![1.png](./images/1.png)\n\nMongoDB에서도 이와 같은 형태로 나타낼 수 있는데, 이를 Linked document라고 한다. Linked 방식은 관계형 데이터베이스와 같이 서로 다른 두 개의 테이블로 분리시켜 관계를 결정짓는 방식이다. 따라서, 자식 객체가 부모 객체와는 별개로 단독으로 사용될 때 적용할 수 있으며, 부모와 자식 객체 간 독립적인 document로 구성되어 있으므로 용량을 상대적으로 줄일 수 있다. 반면, 부모와 자식 객체를 모두 조회할 때에는 부모 객체가 존재하는 collection과 자식 객체가 존재하는 collection을 모두 조회하여야 하므로 상대적으로 읽기 성능이 저하된다는 단점이 있다.\n\n\u003e 게시글과 댓글의 관계를 예로 들 수 있으며, 게시글에 해당하는 댓글 정보를 조회하는 경우 여러번의 읽기 과정 필요하므로 읽기 성능이 저하될 수 있다. 데이터의 일관성이 상대적으로 중요할 때 적용한다.\n\n## 4. Embedded Document\n\n또 다른 방법으로는 부모 객체에 자식 객체를 포함시키는 방식이 있으며, 이를 Embedded document 라고 한다. Embedded 방식은 자식 객체가 부모객체 내에서만 사용될 때 사용하며, 예를 들어, 게시글에 카테고리를 나타내고자 할 때 고려할 수 있다.\n\n![2.png](./images/2.png)\n\n\u003e 게시글과 카테고리 항목의 관계를 예로 들 수 있으며, 한 번의 읽기로 모든 정보를 조회하므로 읽기 성능을 향상시킬 수 있다.\n\n## 5. Linked와 Embedded 방식 비교\n\nLinked와 Embedded 방식은 상황에 따라 장점과 단점이 확연히 구분되므로 데이터의 관계에 따라 적절한 방식을 선택하여야 한다. 예를 들어, 게시글과 댓글의 스키마를 Embedded document로 나타내면 다음과 같다.\n\n```js\n/* Embedded Pattern */\n{\n    \"_id\": 1,\n    \"title\": \"first article\",\n    \"content\": \"first article's content\",\n    \"user\": {\n        \"_id\": ObjectId(\"506ebba74c935cb364575e95\"),\n        \"name\": \"최원영\"\n    },\n    \"comments\": [\n        {\n            \"_id\": 1,\n            \"content\": \"fisrt comment\",\n            \"user\": {\n                \"_id\": ObjectId(\"ebb364575e95a74c935506cb\"),\n                \"name\": \"홍길동\"\n            },\n        },\n        {\n            \"_id\": 2,\n            \"content\": \"second comment\",\n            \"user\": {\n                \"_id\": ObjectId(\"35506cb34c95e956457ebba7\"),\n                \"name\": \"아이유\"\n            }\n        }\n    ]\n}\n```\n\n앞서 언급하였듯이 Embedded document는 읽기가 한 번 수행될 때 필요한 모든 데이터를 조회할 수 있어야 하므로 자식 객체에서 필요한 모든 데이터를 부모 객체에 모두 포함하고 있다. 이와 같이 설계한 경우 몇 가지 문제점이 발생할 수 있는데, 이는 다음과 같다.\n\n\u003e 자식 객체의 속성을 변경한 경우, 부모 객체에 포함된 자식 객체의 속성은 변경되지 않는다.\n\u003e 자식 객체로부터 필요한 모든 속성을 부모 객체에 포함하고 있으므로 document의 용량이 증가한다.\n\u003e 새로운 자식 객체를 추가하는 경우 부모 객체의 속성을 수정하여야 하므로 비효율적이다.\n\u003e 하나의 document는 `16MB`의 용량 제한이 있으며, 용량 제한으로 인해 부모 객체에 자식 객체를 추가할 수 없는 상황이 발생할 수 있다.\n\n이와 같이 새로운 document 생성 및 기존 document의 수정이 빈번하게 발생하는 경우 Embedded 방식은 적절하지 않다. 이번에는 위의 상황을 Linked 방식으로 나타내면 다음과 같다.\n\n```js\n/* Linked Pattern */\n/* articles */\n{\n    \"_id\": 1,\n    \"title\": \"first article's title\",\n    \"content\": \"first article's content\",\n    \"userId\": ObjectId(\"506ebba74c935cb364575e95\")\n}\n\n/* comments */\n{\n    \"_id\": 1,\n    \"content\": \"first comment\",\n    \"articleId\": 1,\n    \"userId\": ObjectId(\"ebb364575e95a74c935506cb\")\n},\n{\n    \"_id\": 2,\n    \"content\": \"second comment\",\n    \"articleId\": 1,\n    \"userId\": ObjectId(\"35506cb34c95e956457ebba7\")\n}\n```\n\nLinked 방식을 적용하면 자식 객체의 식별값을 참조할 수 있으며, 참조하는 collecion이 여러 개인 경우 MongoDB 내부의 표준 참조 기법인 `DBRef`를 사용할 수 있다. 이는 참조하는 collection과 key, value를 함께 명시하는 참조 방법으로 하나의 document가 여러 개의 collection에 존재하는 document를 참조할 수 있도록 해준다.\n\n## 6. 최종 정리\n\n이번 글에서는 `1:N` 관계 패턴의 MongoDB 모델링 방식에 대해서 정리해 보았다. 위에서 언급한 내용 외에도 여러 개의 고려사항이 있는데, 이를 간단히 정리하면 다음과 같다.\n\n### 6.1. Embedded\n\n- 하나의 document에는 최대 `16MB` 용량의 데이터를 저장할 수 있으므로 모델링 시 용량을 고려하여야 한다.\n- 데이터 생성, 수정이 빈번하게 발생하는 경우 Embedded 방식보다는 Linked 방식을 권장한다.\n- 한 번의 쿼리로 필요한 모든 데이터를 조회할 수 있으므로 읽기 성능 향상을 기대할 수 있다.\n\n### 6.2. Linked\n\n- 여러 개의 collection을 참조하므로 복잡하게 느낄 수 있으나, 유연한 데이터 구조를 갖고 있다.\n- 대체적으로 다른 collection의 `_id`를 참조하므로 용량 제한을 걱정하지 않아도 된다.\n- Embedded 방식에 비해 상대적으로 강한 일관성을 나타낸다.\n\n따라서, 사용자 인증 처리 로직이 있는 게시판을 구현하고자 할 때에는 Linked 방식으로 모델링하는 것이 효율적이라고 할 수 있다. 다른 관계 패턴의 모델링에서 데이터 조회 시 읽기 속도가 매우 중요한 경우라고 한다면 Embedded 방식을 적용할 수 있는데, 이와 같이 고려할 상황에 따라 설계 방식에 차이가 발생할 수 있다.\n\n![3.png](./images/3.png)\n"])</script><script>self.__next_f.push([1,"e:Tcbd2,"])</script><script>self.__next_f.push([1,"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABKsAAALQCAIAAADQKWTnAAAgAElEQVR42uzdB5wc533m+a7q3JNzzgEYzCDnHEiCFHOSSEmUZFHBkixLXnsdbn2369u7XfvO/shhZVkWg0WKFHPOJAgSRM4ZGKTB5JxT56r9dzcJQQgzPTM9gwm/r0djAuhQ9dZbVe9T71tvKf/t7372H8+9bFRVAwAAAABgmtI0bV55GcEPAAAAAGYKEiAAAAAAkAABAAAAACRAAAAAAAAJEAAAAABAAgQAAAAAkAABAAAAACRAAAAAAAAJEAAAAABAAgQAAAAAkAABAAAAgAQIAAAAACABAgAAAABIgAAAAAAAEiAAAAAAgAQIAAAAACABAgAAAABIgAAAAAAAEiAAAAAAgAQIAAAAACABAgAAAAAJEAAAAABAAgQAAAAAkAABAAAAACRAAAAAAAAJEAAAAABAAgQAAAAAkAABAAAAACRAAAAAAAAJEAAAAABAAgQAAAAAEiAAAAAAgAQIAAAAACABAgAAAABIgAAAAAAAEiAAAAAAgAQIAAAAACABAgAAAABIgAAAAAAAE /0gbf~niblk8ew.js\",\"/_next/static/chunks/01as9r5n5k.xo.js\",\"/_next/static/chunks/0w526-91d4lxz.js\"],\"TagPageClient\"]\n21:T210f,"])</script><script>self.__next_f.push([1,"\n## 1. 주제\n\nNode.js로 개발할 때 가장 쉽게 접근할 수 있는 데이터베이스로는 MongoDB가 있다. MongoDB는 No-SQL 데이터베이스로 그 형식은 JSON과 매우 유사하다. 이번 일지에서는 사용자 인증 처리 로직이 있는 게시판을 구현하는 경우의 Mongoose 모델 설계 관점에 대해서 다뤄보려고 한다.\n\n## 2. MongoDB의 핵심 기능\n\n앞에서 언급한 주제의 내용을 다루기 전에 간단하게 MongoDB의 핵심 기능에 대해서 다루고 넘어가겠다. MongoDB는 No-SQL 데이터베이스에 속하며, Excel 파일의 테이블 형식이 아닌 JSON 파일과 유사한 document가 collection으로 그룹화되어 있는 구조이다.\n\nMySQL과 같은 관계형 데이터베이스의 경우 하나의 파일에 구조화된 데이터가 저장되는 방식이나, MongoDB는 비교적 형태가 자유롭다. 예를 들어, MySQL의 경우 특정 테이블의 존재하지 않는 field에 데이터를 입력하는 경우 오류가 발생하나, MongoDB는 해당 데이터를 문서에 추가하여 유연하게 동작한다.\n\n이를 다른 말로 나타내면 스키마가 없는 상태(schema-less) 라고 한다. 스키마가 존재하는 MySQL의 경우, 소프트웨어를 설계할 때에는 데이터의 구조에 따라 데이터베이스 구조를 설계하는 방식이라면, MongoDB의 경우에는 스키마가 존재하지 않기 때문에 애플리케이션이 데이터의 구조를 정하는 방식이다.\n\n따라서, 데이터 구조의 변경이 빈번하게 발생하는 개발 초기 단계에서는 스키마를 재설계할 필요가 없으므로 개발 시간을 단축시킬 수 있다. 또한, MySQL의 경우 특정 field에 명시한 데이터 타입을 변경하는 경우 그 과정이 비교적 복잡한 반면에, MongoDB는 스키마가 없는 데이터 모델을 통해 가변적인 속성을 갖는 데이터를 표현할 수 있다는 특징이 있다.\n\n## 3. Linked Document\n\n스키마를 설계할 때에는 데이터 간의 관계를 먼저 따져야 한다. 예를 들어, 게시글과 댓글의 관계를 생각해보자. 하나의 고유한 게시글에는 여러 개의 댓글이 존재할 수 있는 반면, 하나의 고유한 댓글은 여러 개의 게시글에 포함될 수 없으며, 이와 같은 패턴을 `1:N`이라고 하다. MySQL을 사용하면 이와 같은 패턴을 다음과 같은 형태로 나타낼 수 있다.\n\n![1.png](./images/1.png)\n\nMongoDB에서도 이와 같은 형태로 나타낼 수 있는데, 이를 Linked document라고 한다. Linked 방식은 관계형 데이터베이스와 같이 서로 다른 두 개의 테이블로 분리시켜 관계를 결정짓는 방식이다. 따라서, 자식 객체가 부모 객체와는 별개로 단독으로 사용될 때 적용할 수 있으며, 부모와 자식 객체 간 독립적인 document로 구성되어 있으므로 용량을 상대적으로 줄일 수 있다. 반면, 부모와 자식 객체를 모두 조회할 때에는 부모 객체가 존재하는 collection과 자식 객체가 존재하는 collection을 모두 조회하여야 하므로 상대적으로 읽기 성능이 저하된다는 단점이 있다.\n\n\u003e 게시글과 댓글의 관계를 예로 들 수 있으며, 게시글에 해당하는 댓글 정보를 조회하는 경우 여러번의 읽기 과정 필요하므로 읽기 성능이 저하될 수 있다. 데이터의 일관성이 상대적으로 중요할 때 적용한다.\n\n## 4. Embedded Document\n\n또 다른 방법으로는 부모 객체에 자식 객체를 포함시키는 방식이 있으며, 이를 Embedded document 라고 한다. Embedded 방식은 자식 객체가 부모객체 내에서만 사용될 때 사용하며, 예를 들어, 게시글에 카테고리를 나타내고자 할 때 고려할 수 있다.\n\n![2.png](./images/2.png)\n\n\u003e 게시글과 카테고리 항목의 관계를 예로 들 수 있으며, 한 번의 읽기로 모든 정보를 조회하므로 읽기 성능을 향상시킬 수 있다.\n\n## 5. Linked와 Embedded 방식 비교\n\nLinked와 Embedded 방식은 상황에 따라 장점과 단점이 확연히 구분되므로 데이터의 관계에 따라 적절한 방식을 선택하여야 한다. 예를 들어, 게시글과 댓글의 스키마를 Embedded document로 나타내면 다음과 같다.\n\n```js\n/* Embedded Pattern */\n{\n    \"_id\": 1,\n    \"title\": \"first article\",\n    \"content\": \"first article's content\",\n    \"user\": {\n        \"_id\": ObjectId(\"506ebba74c935cb364575e95\"),\n        \"name\": \"최원영\"\n    },\n    \"comments\": [\n        {\n            \"_id\": 1,\n            \"content\": \"fisrt comment\",\n            \"user\": {\n                \"_id\": ObjectId(\"ebb364575e95a74c935506cb\"),\n                \"name\": \"홍길동\"\n            },\n        },\n        {\n            \"_id\": 2,\n            \"content\": \"second comment\",\n            \"user\": {\n                \"_id\": ObjectId(\"35506cb34c95e956457ebba7\"),\n                \"name\": \"아이유\"\n            }\n        }\n    ]\n}\n```\n\n앞서 언급하였듯이 Embedded document는 읽기가 한 번 수행될 때 필요한 모든 데이터를 조회할 수 있어야 하므로 자식 객체에서 필요한 모든 데이터를 부모 객체에 모두 포함하고 있다. 이와 같이 설계한 경우 몇 가지 문제점이 발생할 수 있는데, 이는 다음과 같다.\n\n\u003e 자식 객체의 속성을 변경한 경우, 부모 객체에 포함된 자식 객체의 속성은 변경되지 않는다.\n\u003e 자식 객체로부터 필요한 모든 속성을 부모 객체에 포함하고 있으므로 document의 용량이 증가한다.\n\u003e 새로운 자식 객체를 추가하는 경우 부모 객체의 속성을 수정하여야 하므로 비효율적이다.\n\u003e 하나의 document는 `16MB`의 용량 제한이 있으며, 용량 제한으로 인해 부모 객체에 자식 객체를 추가할 수 없는 상황이 발생할 수 있다.\n\n이와 같이 새로운 document 생성 및 기존 document의 수정이 빈번하게 발생하는 경우 Embedded 방식은 적절하지 않다. 이번에는 위의 상황을 Linked 방식으로 나타내면 다음과 같다.\n\n```js\n/* Linked Pattern */\n/* articles */\n{\n    \"_id\": 1,\n    \"title\": \"first article's title\",\n    \"content\": \"first article's content\",\n    \"userId\": ObjectId(\"506ebba74c935cb364575e95\")\n}\n\n/* comments */\n{\n    \"_id\": 1,\n    \"content\": \"first comment\",\n    \"articleId\": 1,\n    \"userId\": ObjectId(\"ebb364575e95a74c935506cb\")\n},\n{\n    \"_id\": 2,\n    \"content\": \"second comment\",\n    \"articleId\": 1,\n    \"userId\": ObjectId(\"35506cb34c95e956457ebba7\")\n}\n```\n\nLinked 방식을 적용하면 자식 객체의 식별값을 참조할 수 있으며, 참조하는 collecion이 여러 개인 경우 MongoDB 내부의 표준 참조 기법인 `DBRef`를 사용할 수 있다. 이는 참조하는 collection과 key, value를 함께 명시하는 참조 방법으로 하나의 document가 여러 개의 collection에 존재하는 document를 참조할 수 있도록 해준다.\n\n## 6. 최종 정리\n\n이번 글에서는 `1:N` 관계 패턴의 MongoDB 모델링 방식에 대해서 정리해 보았다. 위에서 언급한 내용 외에도 여러 개의 고려사항이 있는데, 이를 간단히 정리하면 다음과 같다.\n\n### 6.1. Embedded\n\n- 하나의 document에는 최대 `16MB` 용량의 데이터를 저장할 수 있으므로 모델링 시 용량을 고려하여야 한다.\n- 데이터 생성, 수정이 빈번하게 발생하는 경우 Embedded 방식보다는 Linked 방식을 권장한다.\n- 한 번의 쿼리로 필요한 모든 데이터를 조회할 수 있으므로 읽기 성능 향상을 기대할 수 있다.\n\n### 6.2. Linked\n\n- 여러 개의 collection을 참조하므로 복잡하게 느낄 수 있으나, 유연한 데이터 구조를 갖고 있다.\n- 대체적으로 다른 collection의 `_id`를 참조하므로 용량 제한을 걱정하지 않아도 된다.\n- Embedded 방식에 비해 상대적으로 강한 일관성을 나타낸다.\n\n따라서, 사용자 인증 처리 로직이 있는 게시판을 구현하고자 할 때에는 Linked 방식으로 모델링하는 것이 효율적이라고 할 수 있다. 다른 관계 패턴의 모델링에서 데이터 조회 시 읽기 속도가 매우 중요한 경우라고 한다면 Embedded 방식을 적용할 수 있는데, 이와 같이 고려할 상황에 따라 설계 방식에 차이가 발생할 수 있다.\n\n![3.png](./images/3.png)\n"])</script><script>self.__next_f.push([1,"22:Tcbd2,"])</script><script>self.__next_f.push([1,"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABKsAAALQCAIAAADQKWTnAAAgAElEQVR42uzdB5wc533m+a7q3JNzzgEYzCDnHEiCFHOSSEmUZFHBkixLXnsdbn2369u7XfvO/shhZVkWg0WKFHPOJAgSRM4ZGKTB5JxT56r9dzcJQQgzPTM9gwm/r0djAuhQ9dZbVe9T71tvKf/t7372H8+9bFRVAwAAAABgmtI0bV55GcEPAAAAAGYKEiAAAAAAkAABAAAAACRAAAAAAAAJEAAAAABAAgQAAAAAkAABAAAAACRAAAAAAAAJEAAAAABAAgQAAAAAkAABAAAAgAQIAAAAACABAgAAAABIgAAAAAAAEiAAAAAAgAQIAAAAACABAgAAAABIgAAAAAAAEiAAAAAAgAQIAAAAACABAgAAAAAJEAAAAABAAgQAAAAAkAABAAAAACRAAAAAAAAJEAAAAABAAgQAAAAAkAABAAAAACRAAAAAAAAJEAAAAABAAgQAAAAAEiAAAAAAgAQIAAAAACABAgAAAABIgAAAAAAAEiAAAAAAgAQIAAAAACABAgAAAABIgAAAAAAAEiAAAAAAgAQIAAAAACRAAAAAAAAJEAAAAABAAgQAAAAAkAABAAAAACRAAAAAAAAJEAAAAABAAgQAAAAAkAABAAAAACRAAAAAAAAJEAAAAABIgAAAAAAAEiAAAAAAgAQIAAAAACABAgAAAABIgAAAAAAAEiAAAAAAgAQIAAAAACABAgAAAABIgAAAAAAAEiAAAAAAkAABAAAAACRAAAAAAAAJEAAAAABAAgQAAAAAkAABAAAAACRAAAAAAAAJEAAAAABAAgQAAAAAkAABAAAAACRA  발생한다.\n\n```sql\n-- 통계 방법이 없으므로 오류가 발생한다.\nSELECT * FROM TBL\nGROUP BY A;\n```\n\n테이블에서 A 필드의 데이터를 기준으로, C 필드의 데이터 값이 50 이상인 행의 수를 구하면 다음과 같다.\n\n```sql\nSELECT A, COUNT(*) FROM TBL\nWHERE C \u003e= 50\nGROUP BY A;\n```\n\n## 3. ORDER BY\n\n`ORDER BY`는 조회한 데이터를 오름차순(`ascending`) 또는 내림차순(`descending`)으로 정렬할 때 사용한다. 테이블에서 C 필드의 데이터를 각각 오름차순과 내림차순으로 정렬된 상태로 조회하면 다음과 같다.\n\n```sql\n-- 오름차순은 ASC 생략이 가능한다.\nSELECT * FROM TBL\nORDER BY C;\n\n-- 내림차순은 반드시 DESC를 입력해주어야 한다.\nSELECT * FROM TBL\nORDER BY C DESC;\n```\n\n`ORDER BY`는 `GROUP BY`와 함께 자주 사용되며, 테이블의 A 필드의 행 수를 내림차순으로 정렬하면 다음과 같다.\n\n```sql\nSELECT A, COUNT(*) FROM TBL\nGROUP BY A\nORDER BY COUNT(*) DESC;\n```\n\n## 4. Alias\n\n`Alias`는 별칭이라고도 하며, 바로 위의 쿼리문과 같이 함수를 다시 호출해야 하는 상황이거나, 테이블 또는 필드명이 긴 경우에 별도의 이름을 붙여주기 위해 사용한다. 먼저, 테이블의 A 필드의 행 수를 내림차순으로 정렬할 때, 행 수에 CNT 라는 별칭을 붙여주면 다음과 같다.\n\n```sql\nSELECT A, COUNT(*) as CNT FROM TBL\nGROUP BY A\nORDER BY CNT DESC;\n```\n"])</script><script>self.__next_f.push([1,"24:T241f,"])</script><script>self.__next_f.push([1,"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAkGBxANEA8QDw8VDhAODw8QDg8QDxAWEBAQFhUXFhcRFhgdHSggGBolGxYXITEhJSkrLy4vFx8zODMsNyktLisBCgoKDg0OGxAQGzYmICYrLi0vLS0tLS8tLS0tLS0rLS0tLSstLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLf/AABEIAKgBLAMBEQACEQEDEQH/xAAbAAEAAgMBAQAAAAAAAAAAAAAABQYBBAcDAv/EAEgQAAEDAgIECQcJBgUFAAAAAAEAAgMEEQYxBRIhURMiMkFhcYGRwQc0UnJzobEUM0KCg8LD0dIjQ0RTVLIWYmOSoiQ1dJPh/8QAGgEBAAMBAQEAAAAAAAAAAAAAAAMEBQIBBv/EADQRAQACAQEDCgYCAgIDAAAAAAABAgMEBRExEiEyM0FCUWFxgRMVIpGhwRRS0fCx4SM08f/aAAwDAQACEQMRAD8A7igICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgwgygICAgICAgICAgICAgICAgICAgICAgICAgICDCDKAgIMINKv0vT03z0rWH0SbuPU0bVJTFe/RhFkz48fSlAVePIG7I4ny9JsxvifcrdNn5J6U7lK+08cdGJlFzY+mPIgY31nOd8LKeNm17bK87Tv2VazscVhyEQ6o3eLlJ8vxeaP5jm8mBjes/0z9mfzT5fi8z5jm8nvFjyoHKiid1B7T8SuZ2bj7Jl3G08kcYhIU2P2H52nc3pY8O9xAUNtm2jo2TV2pXvVTlBiaknsGzBrj9GTiHq27D2FVcmly04x9lvHrMN+E/dLgqutMoCAgICAgIMIMoCAgIMIMoCD gYXoh/Dt7S8+K9/l5v7H8PB/V7xaCpGcmmi6zG0n3ric+WeNpdRpsUcKw3o4msFmtDRuaAAo5mZ4pYrEcH2vHQgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgIP/Z"])</script><script>self.__next_f.push([1,"25:Taaf,"])</script><script>self.__next_f.push([1,"\n## 1. SQL\n\nSQL(Structured Query Language)은 데이터베이스에 요청을 보내는데 사용되는 언어이며 이는 마치 엑셀(Excel)에서의 함수처럼 사용할 수 있다.\n\n| 구분               | 엑셀 | 데이터베이스 |\n| ------------------ | ---- | ------------ |\n| 명령어             | 함수 | SQL          |\n| 데이터 제목        | 열   | 필드         |\n| 데이터 집합        | 시트 | 테이블       |\n| 데이터 집합의 그룹 | 파일 | 데이터베이스 |\n\nSQL로 작성한 명령어를 쿼리(Query)라고 하며, 이를 통해 DB와 테이블 생성, 데이터 조회 등 다양한 작업을 수행할 수 있다.\n\n## 2. SELECT\n\n현재 데이터베이스 서버에 존재하는 모든 데이터베이스 목록을 조회한다.\n\n```sql\nSHOW DATABASES;\n```\n\n현재 사용중인 데이터베이스에 존재하는 모든 테이블 목록을 조회한다.\n\n```sql\nSHOW TABLES;\n```\n\n테이블에 존재하는 모든 필드의 데이터를 조회한다.\n\n```sql\nSELECT * FROM TBL_A;\n```\n\n테이블에 존재하는 A, B 필드의 데이터만 조회한다.\n\n```sql\nSELECT A, B  FROM TBL;\n```\n\n## 3. WHERE\n\n테이블에 존재하는 A 필드의 데이터 중에서 값이 'a'인 모든 행을 조회한다.\n\n```sql\nSELECT * FROM TBL\nWHERE A = 'a';\n```\n\n이번에는 A 필드의 데이터 중에서 값이 'a'가 아닌 모든 행을 조회한다.\n\n```sql\nSELECT * FROM TBL\nWHERE A != 'a\";\n```\n\n테이블에 존재하는 B 필드의 데이터 중에서 값이 50 이상인 모든 행을 조회한다.\n\n```sql\nSELECT name, point FROM TBL\nWHERE B \u003e= 50;\n```\n\nA 필드의 데이터 중에서 값이 'a'이면서 B 필드의 데이터 중에서 값이 50 이상인 행을 조회한다.\n\n```sql\nSELECT * FROM TBL\nWHERE A = 'a' AND B \u003e= 50;\n```\n\n### 3.1. WHERE ~ LIKE\n\n문자열을 나타내는 C 필드의 데이터 중에서 'c'로 시작하는 모든 행을 조회한다.\n\n```sql\nSELECT * FROM TBL\nWHERE C LIKE 'c%';\n```\n\n이번에는 'c'로 끝나는 모든 행을 조회한다.\n\n```sql\nSELECT * FROM TBL\nWHERE C LIKE '%c';\n```\n\n'c'가 포함된 모든 행을 조회하면 다음과 같다.\n\n```sql\nSELECT * FROM TBL\nWHERE C LIKE '%c%';\n```\n\n### 3.2. WHERE ~ BETWEEN\n\n날짜를 나타내는 D 필드의 데이터 중에서 2022년 01월달에 해당하는 모든 데이터를 조회한다.\n\n```sql\nSELECT * FROM TBL\nWHERE D\n  BETWEEN '2022-01-01'\n  AND '2022-02-01';\n```\n\n### 3.3. WHERE ~ IN\n\nB 필드의 데이터 중에서 값이 30, 60, 90인 모든 데이터를 조회한다.\n\n```sql\nSELECT * FROM TBL\nWHERE B IN(30, 60, 90);\n```\n\n### 3.4. LIMIT\n\nB 필드의 데이터 중에서 값이 50이상인 데이터를 5개만 조회한다.\n\n```sql\nSELECT * FROM TBL\nWHERE B \u003e= 50\nLIMIT 5;\n```\n"])</script><script>self.__next_f.push([1,"26:T241f,"])</script><script>self.__next_f.push([1,"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAkGBxANEA8QDw8VDhAODw8QDg8QDxAWEBAQFhUXFhcRFhgdHSggGBolGxYXITEhJSkrLy4vFx8zODMsNyktLisBCgoKDg0OGxAQGzYmICYrLi0vLS0tLS8tLS0tLS0rLS0tLSstLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLf/AABEIAKgBLAMBEQACEQEDEQH/xAAbAAEAAgMBAQAAAAAAAAAAAAAABQYBBAcDAv/EAEgQAAEDAgIECQcJBgUFAAAAAAEAAgMEEQYxBRIhURMiMkFhcYGRwQc0UnJzobEUM0KCg8LD0dIjQ0RTVLIWYmOSoiQ1dJPh/8QAGgEBAAMBAQEAAAAAAAAAAAAAAAMEBQIBBv/EADQRAQACAQEDCgYCAgIDAAAAAAABAgMEBRExEiEyM0FCUWFxgRMVIpGhwRRS0fCx4SM08f/aAAwDAQACEQMRAD8A7igICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgwgygICAgICAgICAgICAgICAgICAgICAgICAgICDCDKAgIMINKv0vT03z0rWH0SbuPU0bVJTFe/RhFkz48fSlAVePIG7I4ny9JsxvifcrdNn5J6U7lK+08cdGJlFzY+mPIgY31nOd8LKeNm17bK87Tv2VazscVhyEQ6o3eLlJ8vxeaP5jm8mBjes/0z9mfzT5fi8z5jm8nvFjyoHKiid1B7T8SuZ2bj7Jl3G08kcYhIU2P2H52nc3pY8O9xAUNtm2jo2TV2pXvVTlBiaknsGzBrj9GTiHq27D2FVcmly04x9lvHrMN+E/dLgqutMoCAgICAgIMIMoCAgIMIMoCDCAgygwgygICAgICAgIPOaVsbXOeQ1rQS5xyAHOvYiZndDy1orG+XPdP4xlmJZTEwxZa+Uj+m/0R1bVr6fQ1rG+/PPgxNTr7W5sfNHirlNSy1DiI2Oledp1QSesnxKu2vTHHPO6FGtL5J+mN8rBR4IqpNshZCNxOs7uGz3qnfaGOOjzrtNm5bceZKw4Aj/eVD3eoxrfjdQW2lbsqs12XXttP4bbMCUozfK7rezwao52hl8kkbNw+f3fTsDUm+UdUjfFq8+YZvL7PfluHz+7XlwDAeRPI31tR3wAXcbRydsQjnZlOy0/hG1WApm34KZknQ9rmHxU1NpV70bkF9mXjozvV/SOhammvwsLmt9McZneNg7Vdx6jHk6MqeTT5MfSh76GxDUUZAY/Xj54nkltuj0ez3rjNpceXjG6fF1g1eTFwnfHg6ToXS8dbHrx7CNj2HlMduP5rEzYbYrcmzdwZ65q8qqRUScQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQU/wAo1W5kUMQNhK5xf0hlrDvcD2LQ2dSJvNp7GZtPJMUivirmE9CCulcHm0cQBeBynXyaNw2Harur1E4a/TxlR0enjNb6uEOmUlJHC0MjYI2jJrRYdfSVh2va077S36UrSN1Y3PdeOhAQEBAQYLboKTjLDcTI31MIEZZYyM
